spring.datasource.url=jdbc:h2:mem:nba_premier_predictor;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.sql.init.mode=never
spring.data.redis.repositories.enabled=false
spring.cache.type=simple
app.import.enabled=false
app.rate-limit.enabled=false
app.prediction-cache.enabled=false
app.search-cache.enabled=false
