spring.application.name=nba-premier-predictor
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nba_premier_predictor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nba}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nba}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.sql.init.mode=never
spring.data.redis.repositories.enabled=false
spring.cache.type=redis
spring.cache.cache-names=playerDetails,playerAverages,playerDashboards,teamDetails,teamDashboards,gameDetails,modelMetrics,modelVersions
spring.cache.redis.time-to-live=10m

management.endpoints.web.exposure.include=health,info
springdoc.swagger-ui.path=/swagger-ui.html

app.import.enabled=${NBA_IMPORT_ENABLED:false}
app.import.path=${NBA_IMPORT_PATH:}
app.ml-service.url=${ML_SERVICE_URL:http://localhost:8000}
app.rate-limit.enabled=${NBA_RATE_LIMIT_ENABLED:true}
app.rate-limit.predictions-per-minute=${NBA_RATE_LIMIT_PREDICTIONS_PER_MINUTE:30}
app.rate-limit.window=${NBA_RATE_LIMIT_WINDOW:1m}
app.rate-limit.trust-forwarded-headers=${NBA_RATE_LIMIT_TRUST_FORWARDED_HEADERS:false}
app.prediction-cache.enabled=${NBA_PREDICTION_CACHE_ENABLED:true}
app.prediction-cache.ttl=${NBA_PREDICTION_CACHE_TTL:10m}
app.search-cache.enabled=${NBA_SEARCH_CACHE_ENABLED:true}
app.search-cache.ttl=${NBA_SEARCH_CACHE_TTL:5m}
app.model-retraining.enabled=${NBA_MODEL_RETRAINING_ENABLED:false}
app.model-retraining.cron=${NBA_MODEL_RETRAINING_CRON:0 0 4 * * *}
app.context-refresh.enabled=${NBA_CONTEXT_REFRESH_ENABLED:false}
app.context-refresh.cron=${NBA_CONTEXT_REFRESH_CRON:0 30 * * * *}
#  Supports structured JSON feeds and trusted-news:<rss-or-atom-url> feeds
app.context-refresh.source-urls=${NBA_CONTEXT_SOURCE_URLS:} 
app.context-refresh.refresh-projections=${NBA_CONTEXT_REFRESH_PROJECTIONS:true}
app.context-refresh.retrain-after-ingestion=${NBA_CONTEXT_REFRESH_RETRAIN:false}
app.aws.enabled=${NBA_AWS_ENABLED:false}
app.aws.endpoint=${NBA_AWS_ENDPOINT:http://localhost:4566}
app.aws.region=${NBA_AWS_REGION:us-east-1}
app.aws.access-key-id=${NBA_AWS_ACCESS_KEY_ID:test}
app.aws.secret-access-key=${NBA_AWS_SECRET_ACCESS_KEY:test}
app.aws.prediction-reports-bucket=${NBA_AWS_PREDICTION_REPORTS_BUCKET:nba-premier-prediction-reports}
app.aws.async-jobs-queue-url=${NBA_AWS_ASYNC_JOBS_QUEUE_URL:http://localhost:4566/000000000000/nba-premier-async-jobs}
