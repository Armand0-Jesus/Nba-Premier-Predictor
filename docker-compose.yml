services:
  postgres:
    image: postgres:16
    container_name: nba-premier-postgres
    environment:
      POSTGRES_DB: nba_premier_predictor
      POSTGRES_USER: nba
      POSTGRES_PASSWORD: nba
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nba -d nba_premier_predictor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: nba-premier-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:latest
    container_name: nba-premier-localstack
    environment:
      SERVICES: s3,sqs,secretsmanager,ssm,logs
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4566/_localstack/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  localstack-init:
    image: localstack/localstack:latest
    container_name: nba-premier-localstack-init
    environment:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    entrypoint: ["/bin/sh", "/init/init-localstack.sh"]
    volumes:
      - ./localstack/init-localstack.sh:/init/init-localstack.sh:ro
    depends_on:
      localstack:
        condition: service_healthy

  ml-service:
    build:
      context: ./ml-service
    container_name: nba-premier-ml-service
    environment:
      BACKEND_API_URL: http://backend:8080
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/artifacts:/app/artifacts

  backend:
    build:
      context: ./backend
    container_name: nba-premier-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nba_premier_predictor
      SPRING_DATASOURCE_USERNAME: nba
      SPRING_DATASOURCE_PASSWORD: nba
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ML_SERVICE_URL: http://ml-service:8000
      NBA_RATE_LIMIT_ENABLED: "true"
      NBA_PREDICTION_CACHE_ENABLED: "true"
      NBA_SEARCH_CACHE_ENABLED: "true"
      NBA_AWS_ENABLED: "true"
      NBA_AWS_ENDPOINT: http://localstack:4566
      NBA_AWS_REGION: us-east-1
      NBA_AWS_ACCESS_KEY_ID: test
      NBA_AWS_SECRET_ACCESS_KEY: test
      NBA_AWS_PREDICTION_REPORTS_BUCKET: nba-premier-prediction-reports
      NBA_AWS_ASYNC_JOBS_QUEUE_URL: http://localstack:4566/000000000000/nba-premier-async-jobs
      NBA_IMPORT_ENABLED: ${NBA_IMPORT_ENABLED:-false}
      NBA_IMPORT_PATH: ${NBA_IMPORT_PATH:-/data/archive.zip}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_started
      localstack-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    container_name: nba-premier-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
  localstack-data:
