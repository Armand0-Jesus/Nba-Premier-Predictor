services:
  postgres:
    image: postgres:16
    container_name: nba-premier-postgres
    environment:
      POSTGRES_DB: nba_premier_predictor
      POSTGRES_USER: nba
      POSTGRES_PASSWORD: nba
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7
    container_name: nba-premier-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
